name: Demo Build and Deploy

on:
  push:
    branches: [ 'main' ]

env:
  QUICKCODE_SESSION_ID: ${{ secrets.QUICKCODE_SESSION_ID }}
  BUILD_AND_PUSH_CONTAINER_SECRET: ${{ secrets.BUILD_AND_PUSH_CONTAINER_GATEWAY }}

jobs:         
  event-listener-service:
    name: Kafka Event Listener Api
    uses: ./.github/workflows/google-cloudrun-event-listener-service.yml
    secrets: inherit

  gateway:
    name: Gateway Api
    uses: ./.github/workflows/google-cloudrun-gateway.yml
    secrets: inherit
  
  portal:
    name: Admin Portal
    uses: ./.github/workflows/google-cloudrun-portal.yml
    secrets: inherit

  identity-module:
    name: Identity Module Api
    uses: ./.github/workflows/google-cloudrun-identity-module.yml
    secrets: inherit

  finance-settlement-module:
    name: Finance Settlement Module Api
    uses: ./.github/workflows/google-cloudrun-finance-settlement-module.yml
    secrets: inherit

  order-management-module:
    name: Order Management Module Api
    uses: ./.github/workflows/google-cloudrun-order-management-module.yml
    secrets: inherit

  pricing-engine-module:
    name: Pricing Engine Module Api
    uses: ./.github/workflows/google-cloudrun-pricing-engine-module.yml
    secrets: inherit

  product-catalog-module:
    name: Product Catalog Module Api
    uses: ./.github/workflows/google-cloudrun-product-catalog-module.yml
    secrets: inherit

  seller-management-module:
    name: Seller Management Module Api
    uses: ./.github/workflows/google-cloudrun-seller-management-module.yml
    secrets: inherit


  complete:
    name: Complete Deployments
    runs-on: ubuntu-latest
    needs:
      - event-listener-service
      - gateway
      - portal
      - identity-module
      - finance-settlement-module
      - order-management-module
      - pricing-engine-module
      - product-catalog-module
      - seller-management-module
    if: always()
    steps:
      - name: Complete Notification
        uses: nick-fields/retry@v2
        with:
          command: curl "https://api.quickcode.net/api/GenerateSite/CompleteGeneration?actionId=${{ env.BUILD_AND_PUSH_CONTAINER_SECRET }}&sessionId=${{ env.QUICKCODE_SESSION_ID }}&message=${{ job.status }}"
          max_attempts: 3
          timeout_minutes: 2
