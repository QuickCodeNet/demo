<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-hidden="true" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="12%" y1="88%" x2="88%" y2="8%">
      <stop offset="0%" stop-color="#1a2448"/>
      <stop offset="42%" stop-color="#2a3878"/>
      <stop offset="72%" stop-color="#3b488e"/>
      <stop offset="100%" stop-color="#9fd4d0"/>
    </linearGradient>
    <linearGradient id="slabA" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#243056" stop-opacity=".95"/>
      <stop offset="100%" stop-color="#4a5aa8" stop-opacity=".55"/>
    </linearGradient>
    <linearGradient id="slabB" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b488e" stop-opacity=".7"/>
      <stop offset="100%" stop-color="#7ecfc4" stop-opacity=".45"/>
    </linearGradient>
    <linearGradient id="slabC" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f766e" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#d8eeec" stop-opacity=".55"/>
    </linearGradient>
    <linearGradient id="slabLite" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5b6db5" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#f2f7f7" stop-opacity=".7"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Diagonal geometric field (≈ -32° from horizontal = / direction) -->
  <g transform="translate(800 450) rotate(-32) translate(-800 -450)">
    <!-- Deep slabs -->
    <rect x="980" y="-80" width="120" height="1100" rx="8" fill="url(#slabA)" opacity=".9"/>
    <rect x="1120" y="-40" width="86" height="1040" rx="8" fill="url(#slabB)" opacity=".75"/>
    <rect x="1224" y="20" width="64" height="980" rx="6" fill="url(#slabC)" opacity=".8"/>
    <rect x="1308" y="80" width="48" height="900" rx="6" fill="url(#slabLite)" opacity=".85"/>
    <rect x="1374" y="140" width="36" height="820" rx="5" fill="#e8f4f3" opacity=".55"/>
    <rect x="1428" y="200" width="28" height="740" rx="4" fill="#ffffff" opacity=".35"/>

    <rect x="820" y="-20" width="72" height="980" rx="7" fill="url(#slabB)" opacity=".55"/>
    <rect x="700" y="40" width="54" height="900" rx="6" fill="url(#slabA)" opacity=".4"/>
    <rect x="580" y="120" width="42" height="820" rx="5" fill="url(#slabC)" opacity=".28"/>

    <!-- Mid accent bars -->
    <rect x="1050" y="60" width="28" height="760" rx="4" fill="#9fd9d0" opacity=".45"/>
    <rect x="1180" y="140" width="18" height="640" rx="3" fill="#ffffff" opacity=".28"/>
    <rect x="1260" y="220" width="14" height="560" rx="3" fill="#c7d2fe" opacity=".4"/>

    <!-- Thin speed lines -->
    <g stroke="#ffffff" stroke-linecap="round" opacity=".55" filter="url(#soft)">
      <line x1="900" y1="120" x2="900" y2="420" stroke-width="2"/>
      <line x1="940" y1="180" x2="940" y2="520" stroke-width="1.5" opacity=".7"/>
      <line x1="1480" y1="160" x2="1480" y2="480" stroke-width="2"/>
      <line x1="1520" y1="240" x2="1520" y2="560" stroke-width="1.5"/>
      <line x1="1560" y1="300" x2="1560" y2="520" stroke-width="1.2"/>
      <line x1="760" y1="260" x2="760" y2="500" stroke-width="1.4" opacity=".45"/>
    </g>
  </g>

  <!-- Soft vignette for brand readability on the left -->
  <rect width="1600" height="900" fill="url(#bg)" opacity="0"/>
  <defs>
    <linearGradient id="readability" x1="0%" y1="50%" x2="70%" y2="50%">
      <stop offset="0%" stop-color="#15203d" stop-opacity=".55"/>
      <stop offset="45%" stop-color="#15203d" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#15203d" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#readability)"/>
</svg>
